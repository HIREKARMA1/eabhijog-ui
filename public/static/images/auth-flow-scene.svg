<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="odGradSaffron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="odGradSea" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="odGradLand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#166534" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="odGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bay of Bengal -->
  <path d="M0 200 Q80 170 120 190 T200 175 T280 185 T360 170 T440 195 V300 H0 Z" fill="url(#odGradSea)"/>

  <!-- Odisha map (coastal outline) -->
  <path d="M72 52 C95 38 118 42 132 58 C148 76 156 98 162 118 C168 138 178 158 188 172 C198 186 208 198 214 212 C220 228 218 244 208 256 C196 270 172 278 148 274 C124 270 104 258 92 242 C78 224 68 200 64 178 C60 156 58 132 62 108 C66 84 68 68 72 52 Z"
        fill="url(#odGradLand)" stroke="rgb(255 255 255 / 0.28)" stroke-width="1.5"/>
  <path d="M188 172 C200 168 218 176 228 192 C236 206 234 224 224 238" stroke="rgb(255 255 255 / 0.2)" stroke-width="1.2" fill="none"/>

  <!-- District hubs -->
  <circle cx="118" cy="118" r="5" fill="#4ade80" opacity="0.95"/>
  <circle cx="148" cy="98" r="4" fill="#4ade80"/>
  <circle cx="168" cy="138" r="4.5" fill="#4ade80"/>
  <circle cx="132" cy="168" r="4" fill="#fbbf24"/>
  <circle cx="188" cy="148" r="4" fill="#4ade80"/>
  <circle cx="108" cy="148" r="3.5" fill="#fb923c"/>

  <!-- Labels -->
  <text x="118" y="108" fill="rgb(255 255 255 / 0.55)" font-size="9" font-family="Segoe UI, sans-serif" text-anchor="middle">Cuttack</text>
  <text x="148" y="88" fill="rgb(255 255 255 / 0.55)" font-size="8" font-family="Segoe UI, sans-serif" text-anchor="middle">Sambalpur</text>
  <text x="188" y="140" fill="rgb(255 255 255 / 0.55)" font-size="8" font-family="Segoe UI, sans-serif" text-anchor="middle">Ganjam</text>

  <text x="130" y="248" fill="#fdba74" font-size="22" font-weight="700" font-family="Noto Sans Oriya, Segoe UI, sans-serif">ଓଡ଼ିଶା</text>
  <text x="130" y="264" fill="rgb(255 255 255 / 0.45)" font-size="9" font-family="Segoe UI, sans-serif" letter-spacing="2">30 DISTRICTS · JANASEVA</text>

  <!-- Konark wheel (watermark) -->
  <g transform="translate(300 24)" opacity="0.85" filter="url(#odGlow)">
    <circle cx="52" cy="52" r="46" stroke="url(#odGradSaffron)" stroke-width="2" fill="rgb(255 255 255 / 0.04)"/>
    <circle cx="52" cy="52" r="36" stroke="#fdba74" stroke-width="1.2" fill="none"/>
    <circle cx="52" cy="52" r="8" fill="#ea580c"/>
    <g stroke="#fdba74" stroke-width="1.8" stroke-linecap="round">
      <line x1="52" y1="10" x2="52" y2="22"/><line x1="52" y1="82" x2="52" y2="94"/>
      <line x1="10" y1="52" x2="22" y2="52"/><line x1="82" y1="52" x2="94" y2="52"/>
      <line x1="22" y1="22" x2="30" y2="30"/><line x1="74" y1="74" x2="82" y2="82"/>
      <line x1="82" y1="22" x2="74" y2="30"/><line x1="30" y1="74" x2="22" y2="82"/>
    </g>
  </g>

  <!-- Deula (temple spire) -->
  <g transform="translate(318 168)">
    <rect x="24" y="48" width="56" height="36" rx="2" fill="rgb(255 255 255 / 0.08)" stroke="rgb(255 255 255 / 0.22)"/>
    <path d="M52 8 C58 28 62 40 68 48 H36 C42 40 46 28 52 8 Z" fill="url(#odGradSaffron)" stroke="#fdba74" stroke-width="1"/>
    <path d="M52 20 C54 32 56 38 58 44 H46 C48 38 50 32 52 20 Z" fill="#c2410c" opacity="0.6"/>
    <rect x="46" y="58" width="12" height="18" rx="1" fill="rgb(0 0 0 / 0.25)"/>
  </g>

  <!-- WhatsApp → desk flow -->
  <g transform="translate(248 36)">
    <rect x="0" y="0" width="72" height="118" rx="12" fill="#0f172a" stroke="rgb(255 255 255 / 0.18)"/>
    <rect x="6" y="14" width="60" height="88" rx="5" fill="#1e293b"/>
    <rect x="12" y="24" width="36" height="6" rx="3" fill="#334155"/>
    <rect x="12" y="38" width="48" height="28" rx="7" fill="#14532d"/>
    <text x="18" y="56" fill="#86efac" font-size="8" font-family="Noto Sans Oriya, Segoe UI, sans-serif">ନମସ୍କାର</text>
    <circle cx="36" cy="108" r="4" fill="#475569"/>
  </g>

  <path d="M220 118 H248" stroke="url(#odGradSaffron)" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 4"/>
  <polygon points="248,118 242,114 242,122" fill="#ea580c"/>

  <!-- Pattachitra corner flourish -->
  <path d="M8 8 H36 M8 8 V36" stroke="#dc2626" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <circle cx="8" cy="8" r="4" fill="#fbbf24" opacity="0.6"/>
</svg>
